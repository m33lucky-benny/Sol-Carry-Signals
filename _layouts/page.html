---
layout: default
---
<article class="page-content">
  <div class="container">
    <header class="page-content__header">
      {%- if page.eyebrow -%}
        <p class="section-header__eyebrow">{{ page.eyebrow }}</p>
      {%- endif -%}
      <h1 class="page-content__title">{{ page.title }}</h1>
      {%- if page.subtitle -%}
        <p class="page-content__subtitle">{{ page.subtitle }}</p>
      {%- endif -%}
    </header>
    <div class="page-content__body">
      {{ content }}
    </div>
  </div>
</article>
